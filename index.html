<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaTae Cafe</title>
<link rel="stylesheet" href="style.css" />
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<header class="header">
<h1>☕ PaTae Cafe</h1>
<p>Fresh Coffee Everyday</p>
</header>

<div id="category-tabs" class="tabs"></div>
<main id="products" class="products"></main>

<div class="cart-bar">
<div><strong id="cart-count">0</strong> items | <strong id="cart-total">0</strong> บาท</div>
<button id="view-cart-btn">View Cart</button>
</div>

<div id="cart-modal" class="modal hidden">
  <div class="modal-content">
    <h2>🛒 Your Cart</h2>

    <div id="cart-items" class="cart-items-scroll"></div>

    <div class="checkout-form">
      <input id="customer-name" type="text" placeholder="ชื่อลูกค้า" />
      <input id="customer-phone" type="tel" placeholder="เบอร์โทร" />

      <select id="fulfillment-type">
        <option value="pickup">รับที่ร้าน / Pickup</option>
        <option value="delivery">จัดส่ง / Delivery</option>
      </select>

      <textarea id="customer-note" placeholder="หมายเหตุ เช่น หวานน้อย ไม่ใส่น้ำแข็ง"></textarea>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Total</span>
        <strong><span id="modal-total">0</span> บาท</strong>
      </div>

      <button id="checkout-btn" class="checkout-btn">Confirm Order</button>
      <button id="close-cart-btn" class="secondary">Close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
