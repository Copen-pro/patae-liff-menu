<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaTae Cafe</title>
<link rel="stylesheet" href="style.css" />
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<div id="success-modal" class="modal hidden">
  <div class="success-content">
    <div class="success-icon">✅</div>
    <h2>รับออเดอร์แล้วค่ะ</h2>

    <div class="success-queue">
      Queue: <span id="success-queue-no">-</span>
    </div>

    <p>
      Order No: <span id="success-order-no">-</span>
    </p>

    <p class="success-note">
      กรุณารอเรียกคิวที่ร้านนะคะ ☕
    </p>

    <button id="success-close-btn" class="checkout-btn">
      กลับไปหน้าเมนู
    </button>
  </div>
</div>
  
<body>
<header class="header">
<h1>☕ PaTae Cafe</h1>
<p>Fresh Coffee Everyday</p>
</header>

<div id="category-tabs" class="tabs"></div>
<main id="products" class="products"></main>

<div class="cart-bar">
<div><strong id="cart-count">0</strong> items | <strong id="cart-total">0</strong> บาท</div>
<button id="view-cart-btn">View Cart</button>
</div>

<div id="cart-modal" class="modal hidden">
  <div class="modal-content">
    <h2>🛒 Your Cart</h2>

    <div id="cart-view">
      <div id="cart-items" class="cart-items-scroll"></div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Total</span>
          <strong><span id="modal-total">0</span> บาท</strong>
        </div>

        <button id="go-checkout-btn" class="checkout-btn">Checkout</button>
        <button id="close-cart-btn" class="secondary">Close</button>
      </div>
    </div>

    <div id="checkout-view" class="hidden">
      <h3>ข้อมูลสำหรับออเดอร์</h3>

      <div class="checkout-form">
        <input id="customer-name" type="text" placeholder="ชื่อลูกค้า" />
        <input id="customer-phone" type="tel" placeholder="เบอร์โทร" />

        <select id="fulfillment-type">
          <option value="pickup">รับที่ร้าน / Pickup</option>
          <option value="delivery">จัดส่ง / Delivery</option>
        </select>
<select id="fulfillment-type">
  <option value="pickup">รับที่ร้าน / Pickup</option>
  <option value="delivery">จัดส่ง / Delivery</option>
</select>

<div id="delivery-fields" class="hidden">

  <textarea
    id="delivery-address"
    placeholder="กรุณาระบุบ้านเลขที่ / อาคาร / ชั้น / จุดสังเกต"
  ></textarea>

  <div class="delivery-help">
    และส่ง Location ทาง LINE Chat เพิ่มเติม
    เพื่อความรวดเร็วในการจัดส่ง 📍
  </div>

</div>

<textarea
  id="customer-note"
  placeholder="หมายเหตุ เช่น หวานน้อย ไม่ใส่น้ำแข็ง"
></textarea>
        
      </div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Total</span>
          <strong><span id="checkout-total">0</span> บาท</strong>
        </div>

        <button id="confirm-order-btn" class="checkout-btn">Confirm Order</button>
        <button id="back-to-cart-btn" class="secondary">Back to Cart</button>
      </div>
    </div>
  </div>
</div>

  
<script src="app.js"></script>
</body>
</html>
