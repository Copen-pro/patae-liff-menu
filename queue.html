<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Queue</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body{
      background:#f7f4ef;
      padding:20px;
      font-family:sans-serif;
    }

    .queue-card{
      background:white;
      border-radius:24px;
      padding:28px;
      max-width:420px;
      margin:40px auto;
      text-align:center;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }

    .queue-no{
      font-size:42px;
      font-weight:bold;
      margin:20px 0;
      color:#5c3b2e;
    }

    .status{
      font-size:20px;
      margin-bottom:20px;
    }

    .items{
      text-align:left;
      background:#f5f5f5;
      padding:14px;
      border-radius:12px;
      white-space:pre-wrap;
      margin-top:18px;
    }
  </style>
</head>

<body>

<div class="queue-card">

  <h2>🧾 MY QUEUE</h2>

  <div id="loading">
    Loading...
  </div>

  <div id="queue-box" style="display:none;">

    <div class="queue-no" id="queue-no">
      A001
    </div>

    <div class="status">
      Status:
      <strong id="order-status">
        NEW
      </strong>
    </div>

    <div>
      Order No:
      <span id="order-no"></span>
    </div>

    <div style="margin-top:10px;">
      Total:
      <span id="total-amount"></span>
      บาท
    </div>

    <div class="items" id="items-summary"></div>

  </div>

</div>

<script>

const LIFF_ID = "2010088421-1DJFs0Xx";
const API_URL = "https://copen.app.n8n.cloud/webhook/patae/my-queue";

async function start(){

  await liff.init({
    liffId: LIFF_ID
  });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      line_user_id: profile.userId
    })
  });

  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  if(!data.found){

    document.getElementById("queue-box").style.display = "block";

    document.getElementById("queue-box").innerHTML = `
      <h3>ยังไม่พบออเดอร์ล่าสุดค่ะ ☕</h3>
    `;

    return;
  }

  document.getElementById("queue-box").style.display = "block";

  document.getElementById("queue-no").innerText =
    data.queue_no;

  document.getElementById("order-status").innerText =
    data.order_status;

  document.getElementById("order-no").innerText =
    data.order_no;

  document.getElementById("total-amount").innerText =
    data.total_amount;

  document.getElementById("items-summary").innerText =
    data.items_summary;

}

start();

</script>

</body>
</html>
