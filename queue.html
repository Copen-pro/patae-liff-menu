<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Queue</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body{
      background:#f7f4ef;
      padding:20px;
      font-family:sans-serif;
    }

    .queue-card{
      background:white;
      border-radius:24px;
      padding:28px;
      max-width:420px;
      margin:40px auto;
      text-align:center;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }

    .queue-no{
      font-size:42px;
      font-weight:bold;
      margin:20px 0;
      color:#5c3b2e;
    }

    .status{
      font-size:20px;
      margin-bottom:20px;
    }

.status-badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-weight:bold;
  color:white;
}

.status-new{
  background:#8e8e93;
}

.status-preparing{
  background:#f5a623;
}

.status-ready{
  background:#34c759;
}

.status-done{
  background:#5ac8fa;
} 

.payment-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-weight:bold;
  color:white;
}

.payment-paid{
  background:#34c759;
}

.payment-unpaid{
  background:#f5a623;
}
    .items{
      text-align:left;
      background:#f5f5f5;
      padding:14px;
      border-radius:12px;
      white-space:pre-wrap;
      margin-top:18px;
    }
  </style>
</head>

<body>

<div class="queue-card">

  <h2>🧾 MY QUEUE</h2>

  <div id="loading">
    Loading...
  </div>

  <div id="queue-box" style="display:none;">

    <div class="queue-no" id="queue-no">
      A001
    </div>

    <div class="status">
      Status:
      <strong id="order-status">
        NEW
      </strong>
    </div>

    <div style="margin-top:10px;">
      Payment:
      <span id="payment-status"></span>
    </div>
    
    <div>
      Order No:
      <span id="order-no"></span>
    </div>

    <div id="amount-box" style="margin-top:10px;"></div>

    <div class="items" id="items-summary"></div>

  </div>

</div>

<script>

const LIFF_ID = "2010088421-yQ9Cqk5p";
const API_URL = "https://copen.app.n8n.cloud/webhook/patae/my-queue";

async function start(){

  await liff.init({
    liffId: LIFF_ID
  });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      line_user_id: profile.userId
    })
  });

  const data = await res.json();

  alert("payment_status = " + data.payment_status);
  
  alert(JSON.stringify(data));
  
  console.log("MY QUEUE DATA:", data);

  document.getElementById("loading").style.display = "none";

  if(!data.found){

    document.getElementById("queue-box").style.display = "block";

    document.getElementById("queue-box").innerHTML = `
      <h3>ยังไม่พบออเดอร์ล่าสุดค่ะ ☕</h3>
    `;

    return;
  }

  document.getElementById("queue-box").style.display = "block";

  document.getElementById("queue-no").innerText =
    data.queue_no;

const statusMap = {
  NEW: "รับออเดอร์แล้ว",
  PREPARING: "กำลังทำ",
  READY: "พร้อมรับแล้ว",
  DONE: "เสร็จแล้ว"
};

const status = data.order_status || "NEW";
const statusText = statusMap[status] || status;

const statusEl = document.getElementById("order-status");
statusEl.innerText = statusText;
statusEl.className = "status-badge status-" + status.toLowerCase();

  document.getElementById("order-no").innerText =
    data.order_no;

  const paymentEl =
  document.getElementById("payment-status");

const paymentStatus =
  String(data.payment_status || "UNPAID")
    .trim()
    .toUpperCase();

paymentEl.innerText =
  paymentStatus === "PAID"
    ? "💰 PAID"
    : "⏳ UNPAID";

paymentEl.className =
  "payment-badge " +
  (
    paymentStatus === "PAID"
      ? "payment-paid"
      : "payment-unpaid"
  );
  
  const amountBox = document.getElementById("amount-box");

if(data.fulfillment_type === "delivery"){

  amountBox.innerHTML = `
    <div><strong>ยอดสินค้า:</strong> ${data.total_amount || 0} บาท</div>
    <div><strong>ค่าส่ง:</strong> ${data.delivery_fee || 0} บาท</div>
    <div><strong>รวมทั้งหมด:</strong> ${data.grand_total || data.total_amount || 0} บาท</div>
  `;

}else{

  amountBox.innerHTML = `
    <div><strong>Total:</strong> ${data.total_amount || 0} บาท</div>
  `;

}

  document.getElementById("items-summary").innerText =
    data.items_summary;

}

start();

</script>

</body>
</html>
